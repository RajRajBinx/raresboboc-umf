<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exersează - UMF</title>
  <link rel="stylesheet" href="shared/css/main.css">
  <link rel="stylesheet" href="shared/css/quiz.css">
</head>
<body>
  <div class="container">
    <nav class="subpage-nav">
      <a href="index.html" class="btn-back" id="nav-back"><span>Înapoi</span></a>
      <button id="theme-toggle" class="theme-toggle-btn">Tema</button>
    </nav>
    <div class="quiz-wrapper">
      <div id="quiz-container" class="quiz-container">
        <div class="quiz-header">
          <div class="quiz-subject-info">
            <div id="quiz-subject-title" class="quiz-subject-title"></div>
            <div id="quiz-subject-sub" class="quiz-subject-sub"></div>
          </div>
          <div id="quiz-timer-wrapper" class="quiz-timer-wrapper" style="display:none;">
            <span id="quiz-timer"></span>
          </div>
          <div id="quiz-mode-badge" class="quiz-mode-badge"></div>
        </div>
        <div class="quiz-progress-bar-wrapper"><div id="quiz-progress-fill" class="quiz-progress-fill"></div></div>
        <div class="quiz-body">
          <div class="question-meta">
            <div id="question-count-text" class="question-count"></div>
            <div id="question-type-badge" class="question-type-badge"></div>
          </div>
          <div id="question-text" class="question-text"></div>
          <div id="question-hint" class="question-hint"></div>
          <div id="options-list" class="options-list"></div>
          <div id="explanation-panel" class="explanation-panel" style="display:none;">
            <h4>Explicație:</h4>
            <p id="explanation-text"></p>
          </div>
        </div>
        <div class="quiz-footer">
          <button id="btn-verify" class="btn-primary" disabled>Verifică Răspuns</button>
        </div>
      </div>
      <div id="results-container" class="results-container" style="display:none;">
        <h2 id="results-main-title"></h2>
        <h3 id="results-subject-title" class="results-subject-title"></h3>
        <div id="stat-time-spent-wrapper">Timp: <span id="res-time-spent"></span></div>
        <button id="btn-restart" class="btn-primary">Reîncearcă</button>
        <button id="btn-home" class="btn-secondary">Acasă</button>
        <div id="review-panel" class="review-panel">
          <h3>Recenzie</h3>
          <div id="review-questions-list"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="shared/js/shared.js"></script>
  <script src="shared/js/quiz-engine.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const subject = urlParams.get('subject') || 'anatomie-1-2';
    const script = document.createElement('script');
    script.src = `data/${subject}.js`;
    script.onload = () => initQuiz('exerseaza');
    document.body.appendChild(script);
  </script>
</body>
</html>
