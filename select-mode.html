<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alege Modul - UMF</title>
  <link rel="stylesheet" href="shared/css/main.css">
  <link rel="stylesheet" href="shared/css/select-mode.css">
  <script src="shared/js/theme.js"></script>
</head>
<body>
  <div class="container">
    <nav class="subpage-nav" style="justify-content: flex-end;">
      <button id="theme-toggle" class="theme-toggle-btn">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </nav>
    <div class="setup-wrapper">
      <div class="setup-container">
        <div class="setup-header">
          <h2 id="subject-title" class="setup-title">Grile</h2>
          <p id="subject-subtitle" class="setup-subtitle"></p>
        </div>
        <div class="modes-grid">
          <div class="mode-card" id="mode-exerseaza">
            <h3 class="mode-name">Exersează</h3>
            <p class="mode-desc">Toate cele 300 de intrebari cu toate cele 10 raspunsuri.</p>
          </div>
          <div class="mode-card" id="mode-simulare">
            <h3 class="mode-name">Simulare</h3>
            <p class="mode-desc">48 de intrebari cu CM si CS</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="shared/js/shared.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const subject = urlParams.get('subject') || 'anatomie-1-2';
    
    document.getElementById('mode-exerseaza').onclick = () => {
      window.location.href = `exerseaza.html?subject=${subject}`;
    };
    document.getElementById('mode-simulare').onclick = () => {
      window.location.href = `simulare.html?subject=${subject}`;
    };

    // Load subject info for display
    const script = document.createElement('script');
    script.src = `data/${subject}.js`;
    script.onload = () => {
      document.getElementById('subject-title').textContent = `Grile ${quizData.title}`;
      document.getElementById('subject-subtitle').textContent = `Anul ${quizData.year} • Semestrul ${quizData.semester}`;
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
