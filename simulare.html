<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulare - UMF</title>
  <link rel="stylesheet" href="shared/css/main.css">
  <link rel="stylesheet" href="shared/css/quiz.css">
  <script src="shared/js/theme.js"></script>
</head>
<body>
  <div class="container">
    <nav class="subpage-nav" style="justify-content: flex-end;">
      <button id="theme-toggle" class="theme-toggle-btn">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </nav>
    <div class="quiz-wrapper">
      <div id="quiz-container" class="quiz-container">
        <div class="quiz-header">
          <div class="quiz-subject-info">
            <div id="quiz-subject-title" class="quiz-subject-title"></div>
            <div id="quiz-subject-sub" class="quiz-subject-sub"></div>
          </div>
          <div class="header-actions">
            <div id="quiz-timer-wrapper" class="quiz-timer-wrapper">
              <span id="quiz-timer">48:00</span>
            </div>
            <div id="quiz-mode-badge" class="quiz-mode-badge"></div>
          </div>
        </div>
        <div class="quiz-progress-bar-wrapper"><div id="quiz-progress-fill" class="quiz-progress-fill"></div></div>
        <div class="quiz-body">
          <div class="question-meta">
            <div id="question-count-text" class="question-count"></div>
            <div id="question-type-badge" class="question-type-badge"></div>
          </div>
          <div id="question-text" class="question-text"></div>
          <div id="question-hint" class="question-hint"></div>
          <div id="options-list" class="options-list"></div>
          <div id="explanation-panel" class="explanation-panel" style="display:none;">
            <h4>Explicație:</h4>
            <p id="explanation-text"></p>
          </div>
        </div>
        <div class="quiz-footer">
          <button id="btn-verify" class="btn-primary" disabled>Următoarea Întrebare</button>
        </div>
      </div>
      <div id="results-container" class="results-container" style="display:none;">
        <h2 id="results-main-title"></h2>
        <h3 id="results-subject-title" class="results-subject-title"></h3>
        <div id="stat-time-spent-wrapper">Timp: <span id="res-time-spent"></span></div>
        <button id="btn-restart" class="btn-primary">Reîncearcă</button>
        <button id="btn-home" class="btn-secondary">Acasă</button>
        <div id="review-panel" class="review-panel">
          <h3>Recenzie</h3>
          <div id="review-questions-list"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="shared/js/shared.js"></script>
  <script src="shared/js/quiz-engine.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const subject = urlParams.get('subject') || 'anatomie-1-2';
    const script = document.createElement('script');
    script.src = `data/${subject}.js`;
    script.onload = () => initQuiz('simulare');
    document.body.appendChild(script);
  </script>
</body>
</html>
