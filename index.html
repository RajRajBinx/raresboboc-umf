<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Platforma interactiva de auto-evaluare UMF pentru Anatomie.">
  <title>UMF Auto-Evaluare</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">
    <header class="main-header">
      <h1 class="main-title">UMF Auto-Evaluare</h1>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Comută tema">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
      </button>
    </header>

    <main id="dashboard-view">
      
      <div class="year-section anul-1">
        <h2 class="year-title">Anul 1</h2>
        
        <div class="semester-section">
          <h3 class="semester-title">
            <span class="sem-indicator sem-2-indicator"></span>Semestrul 2
          </h3>
          
          <div class="cards-grid">
            <a href="anatomie-1-2/select-mode.html" class="subject-card sem-2">
              <div class="card-title">Anatomie</div>
            </a>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="index.js"></script>
</body>
</html>
